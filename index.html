<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hoyt</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #111;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      /* Base tone lives on html so .ambient isn’t fighting an opaque body fill */
      background: transparent;
    }
    html {
      min-height: 100%;
      background: #8a9aad;
    }

    /* Silver-blue: center stays light; motion lives at the edges */
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background: radial-gradient(
        ellipse 92% 88% at 50% 48%,
        #f7f9fc 0%,
        #eef3f9 28%,
        #d4dde8 58%,
        #9eb0c4 100%
      );
    }
    .ambient__wash {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        145deg,
        #5c6e82 0%,
        #9eb4c8 34%,
        #7d92a8 66%,
        #4a5c70 100%
      );
      background-size: 280% 280%;
      animation: wash-shift 32s ease-in-out infinite;
      opacity: 0.72;
      /* Strong in the periphery only — center stays bright (white = visible) */
      -webkit-mask-image: radial-gradient(
        ellipse 72% 68% at 50% 48%,
        transparent 0%,
        transparent 46%,
        rgba(255, 255, 255, 0.55) 74%,
        #fff 100%
      );
      mask-image: radial-gradient(
        ellipse 72% 68% at 50% 48%,
        transparent 0%,
        transparent 46%,
        rgba(255, 255, 255, 0.55) 74%,
        #fff 100%
      );
    }
    .ambient__blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(48px);
      opacity: 0.88;
      will-change: transform;
    }
    .ambient__blob--a {
      width: min(78vw, 560px);
      height: min(78vw, 560px);
      top: -14%;
      left: -10%;
      background: radial-gradient(circle at 38% 38%, rgba(230, 242, 255, 0.62), rgba(230, 242, 255, 0) 58%);
      animation: drift-a 28s ease-in-out infinite;
    }
    .ambient__blob--b {
      width: min(70vw, 500px);
      height: min(70vw, 500px);
      bottom: -12%;
      right: -14%;
      background: radial-gradient(circle at 55% 42%, rgba(45, 70, 98, 0.48), rgba(45, 70, 98, 0) 56%);
      animation: drift-b 32s ease-in-out infinite;
    }
    .ambient__blob--c {
      width: min(52vw, 380px);
      height: min(52vw, 380px);
      top: -6%;
      right: -10%;
      left: auto;
      background: radial-gradient(circle at 45% 55%, rgba(170, 195, 218, 0.52), rgba(170, 195, 218, 0) 58%);
      animation: drift-c 24s ease-in-out infinite;
    }
    .ambient__sheen {
      position: absolute;
      inset: -50%;
      background:
        linear-gradient(
          125deg,
          transparent 0%,
          rgba(240, 248, 255, 0.38) 40%,
          rgba(255, 255, 255, 0.5) 50%,
          rgba(220, 232, 248, 0.28) 60%,
          transparent 100%
        );
      background-size: 220% 220%;
      animation: sheen 45s linear infinite;
      opacity: 0.5;
      /* Sheen mostly at the rim so the middle stays clean */
      -webkit-mask-image: radial-gradient(
        ellipse 88% 85% at 50% 48%,
        transparent 0%,
        transparent 34%,
        rgba(255, 255, 255, 0.45) 68%,
        #fff 100%
      );
      mask-image: radial-gradient(
        ellipse 88% 85% at 50% 48%,
        transparent 0%,
        transparent 34%,
        rgba(255, 255, 255, 0.45) 68%,
        #fff 100%
      );
    }

    @keyframes wash-shift {
      0%, 100% { background-position: 10% 22%; }
      50% { background-position: 90% 76%; }
    }

    @keyframes drift-a {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(8%, 12%) scale(1.06); }
      66% { transform: translate(4%, -6%) scale(0.98); }
    }
    @keyframes drift-b {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40% { transform: translate(-10%, -8%) scale(1.05); }
      75% { transform: translate(-4%, 6%) scale(0.97); }
    }
    @keyframes drift-c {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-18px, 12px) scale(1.06); }
    }
    @keyframes sheen {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .ambient__wash {
        animation: none;
        background-position: 50% 50%;
      }
      .ambient__blob,
      .ambient__sheen {
        animation: none;
      }
    }

    .shell {
      position: relative;
      z-index: 1;
      background: transparent;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero img {
      max-width: min(90vw, 400px);
      height: auto;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.12));
    }
    .landing {
      padding: 3rem 2rem 4rem;
      text-align: center;
    }
    .tagline {
      font-size: 1.125rem;
      color: #3a4a5c;
      max-width: 480px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.55);
    }
    .links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: #111;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding-bottom: 2px;
      border-bottom: 1.5px solid rgba(0, 0, 0, 0.18);
      transition: border-color 0.2s;
    }
    .links a:hover {
      border-color: #111;
    }
    .colophon {
      text-align: center;
      font-size: 0.8rem;
      color: #5a6a7a;
      letter-spacing: 0.02em;
      padding: 0 1.5rem 2.5rem;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="ambient__wash"></div>
    <div class="ambient__blob ambient__blob--a"></div>
    <div class="ambient__blob ambient__blob--b"></div>
    <div class="ambient__blob ambient__blob--c"></div>
    <div class="ambient__sheen"></div>
  </div>

  <div class="shell">
    <div class="hero">
      <img src="hoyt.svg" alt="Hoyt" width="298" height="127" />
    </div>

    <footer class="landing">
      <p class="tagline">Fluent in machine. Conversationally ambiguous to humans.</p>
    </footer>

    <div class="colophon">Hoyt &mdash; somewhere between the stack trace and the stars.</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hoyt</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #111;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: transparent;
    }
    html {
      min-height: 100%;
      background: #2a2018;
    }

    .cover-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: url("arrival_2000.jpeg") center / cover no-repeat;
    }

    .shell {
      position: relative;
      z-index: 1;
      background: transparent;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 1.5rem 1.5rem max(1.75rem, env(safe-area-inset-bottom));
      gap: 0.75rem;
    }
    .hero img {
      max-width: min(38vw, 160px);
      height: auto;
      display: block;
      filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.45));
    }
    .tagline {
      font-size: clamp(1.05rem, 3.4vw, 1.5rem);
      font-weight: 400;
      color: #fff;
      width: 80%;
      max-width: 300px;
      margin: 0;
      line-height: 1.3em;
      text-align: left;
      filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.45));
    }

    @media (max-width: 768px) {
      .hero {
        margin-top: auto;
        padding: 1rem 1.5rem max(1.75rem, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div class="cover-bg" aria-hidden="true"></div>

  <div class="shell">
    <div class="hero">
      <img src="hoyt.svg" alt="Hoyt" width="298" height="127" />
      <p class="tagline">Fluent in machine. Conversationally ambiguous to humans.</p>
    </div>
  </div>
</body>
</html>

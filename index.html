<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hoyt</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <noscript><style>.load-veil{display:none!important}</style></noscript>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #111;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: transparent;
    }
    html {
      min-height: 100%;
      background: #000;
    }

    .cover-stack {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .cover-bg {
      position: absolute;
      inset: 0;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }
    .cover-bg--preview {
      background-image: url("arrival_small.jpeg");
    }
    .cover-bg--full {
      opacity: 0;
      transition: opacity 1.15s ease;
    }
    .cover-bg--full.is-visible {
      opacity: 1;
    }

    .shell {
      position: relative;
      z-index: 1;
      background: transparent;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      min-height: 100vh;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 1.5rem 1.5rem max(1.75rem, env(safe-area-inset-bottom));
      gap: 0.75rem;
    }
    .hero img {
      max-width: min(38vw, 160px);
      height: auto;
      display: block;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.28));
    }
    .tagline {
      font-size: clamp(1.05rem, 3.4vw, 1.5rem);
      font-weight: 400;
      color: #fff;
      width: 80%;
      max-width: 300px;
      margin: 0;
      line-height: 1.3em;
      text-align: left;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.28));
    }

    @media (max-width: 768px) {
      .hero {
        padding: 1rem 1.5rem max(1.75rem, env(safe-area-inset-bottom));
      }
    }

    .load-veil {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      opacity: 1;
      transition: opacity 0.75s ease;
      pointer-events: auto;
    }
    .load-veil.is-done {
      opacity: 0;
      pointer-events: none;
    }
    @media (prefers-reduced-motion: reduce) {
      .load-veil,
      .cover-bg--full {
        transition-duration: 0.01ms;
      }
    }
  </style>
</head>
<body>
  <div class="cover-stack" aria-hidden="true">
    <div class="cover-bg cover-bg--preview"></div>
    <div class="cover-bg cover-bg--full"></div>
  </div>

  <div class="shell">
    <div class="hero">
      <img src="hoyt.svg" alt="Hoyt" width="298" height="127" />
      <p class="tagline">Fluent in machine. Conversationally ambiguous to humans.</p>
    </div>
  </div>

  <div class="load-veil" aria-hidden="true"></div>
  <script>
    (function () {
      var veil = document.querySelector(".load-veil");
      var fullEl = document.querySelector(".cover-bg--full");
      var small = new Image();
      var big = new Image();

      function revealVeil() {
        veil.classList.add("is-done");
        veil.addEventListener(
          "transitionend",
          function onVeilEnd(e) {
            if (e.propertyName !== "opacity") return;
            veil.style.visibility = "hidden";
          },
          { once: true }
        );
        big.onload = function () {
          fullEl.style.backgroundImage = 'url("arrival_big.jpeg")';
          requestAnimationFrame(function () {
            fullEl.classList.add("is-visible");
          });
        };
        big.onerror = function () {};
        big.src = "arrival_big.jpeg";
      }

      small.onload = revealVeil;
      small.onerror = revealVeil;
      small.src = "arrival_small.jpeg";
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hoyt</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #111;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: transparent;
    }
    html {
      min-height: 100%;
      background: #2a2018;
    }

    .cover-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: url("arrival_2000.jpeg") center / cover no-repeat;
    }

    .shell {
      position: relative;
      z-index: 1;
      background: transparent;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero img {
      max-width: min(90vw, 400px);
      height: auto;
      filter:
        drop-shadow(0 0 1px rgba(255, 255, 255, 0.9))
        drop-shadow(0 2px 12px rgba(0, 0, 0, 0.45));
    }
    .landing {
      padding: 3rem 2rem 4rem;
      text-align: center;
    }
    .tagline {
      font-size: 1.125rem;
      color: #1c140c;
      max-width: 480px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
      text-shadow:
        0 0 12px rgba(255, 240, 210, 0.95),
        0 1px 2px rgba(255, 255, 255, 0.9),
        0 2px 16px rgba(0, 0, 0, 0.25);
    }
    .links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: #111;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding-bottom: 2px;
      border-bottom: 1.5px solid rgba(0, 0, 0, 0.18);
      transition: border-color 0.2s;
    }
    .links a:hover {
      border-color: #111;
    }
    .colophon {
      text-align: center;
      font-size: 0.8rem;
      color: #2a2218;
      letter-spacing: 0.02em;
      padding: 0 1.5rem 2.5rem;
      text-shadow:
        0 0 10px rgba(255, 235, 200, 0.9),
        0 1px 2px rgba(255, 255, 255, 0.85);
    }
  </style>
</head>
<body>
  <div class="cover-bg" aria-hidden="true"></div>

  <div class="shell">
    <div class="hero">
      <img src="hoyt.svg" alt="Hoyt" width="298" height="127" />
    </div>

    <footer class="landing">
      <p class="tagline">Fluent in machine. Conversationally ambiguous to humans.</p>
    </footer>

    <div class="colophon">Hoyt &mdash; somewhere between the stack trace and the stars.</div>
  </div>
</body>
</html>
